$CLOCK_FONT = Inter Variable
$FONT = Inter Variable
$MONOSPACE_FONT = CaskaydiaCove Nerd Font Propo

animations {
  animation = fadeIn, 0
  animation = fadeOut, 0
}

background {
  path = $BACKGROUND_PATH
  color = $primary_container
  blur_passes = 0
  blur_size = 0
}

# --- Main container (date & input field) --- #

shape {
  size = 400, 60
  color = $surface
  shadow_passes = 1
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.0
  position = 0, 30
  border_size = 2
  border_color = $outline
  halign = center
  valign = bottom
  rounding = -1
  zindex = 2
}

# --- Date --- #

label {
  color = $primary
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000] echo "<span font_features='tnum'>$(date "+%m")</span>"
  font_size = 20
  font_family = $CLOCK_FONT
  halign = center
  valign = bottom
  position = -153, 50
  zindex = 4
}

label {
  color = $secondary
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000] echo "<span font_features='tnum'>$(date "+%d")</span>"
  font_size = 20
  font_family = $CLOCK_FONT
  halign = center
  valign = bottom
  position = -107, 40
  zindex = 4
}

# --- Date seperator --- #

shape {
  size = 1, 45
  color = $on_surface_variant
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.0
  position = -130, 38
  halign = center
  valign = bottom
  rounding = -1
  zindex = 3
  rotate = -15
}

# --- Input field --- #

input-field {
  size = 250, 40
  outline_thickness = 2
  dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
  dots_spacing = 0.6 # Scale of dots' absolute size, 0.0 - 1.0
  dots_center = true
  dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
  outer_color = $outline_variant
  inner_color = $surface_container_high
  font_color = $primary
  font_family = $FONT
  fade_on_empty = false
  fade_timeout = 2000
  placeholder_text = <b>$USER</b> # Text rendered in the input box when it's empty.
  hide_input = false
  rounding = -1 # -1 means complete rounding (circle/oval)
  check_color = $primary
  fail_color = $error # if authentication failed, changes outer_color and fail message color
  fail_text = <b>$FAIL ($ATTEMPTS)</b> # can be set to empty
  fail_transition = 200 # transition time in ms between normal outer_color and fail_color
  capslock_color = $tertiary
  numlock_color = $outline_variant
  bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
  invert_numlock = false # change color if numlock is off
  swap_font_color = false # see below
  position = 60, 42
  halign = center
  valign = bottom
  shadow_passes = 0
  shadow_size = 4
  shadow_color = $shadow
  shadow_boost = 1.0
  zindex = 4
}

# --- Power button containers --- #

shape {
  size = 40, 40
  color = $surface
  shadow_passes = 1
  shadow_size = 1
  shadow_color = $shadow
  shadow_boost = 1.0
  position = 260, 40
  border_size = 2
  border_color = $outline
  halign = center
  valign = bottom
  rounding = -1
  zindex = 2
}

shape {
  size = 40, 40
  color = $surface
  shadow_passes = 1
  shadow_size = 1
  shadow_color = $shadow
  shadow_boost = 1.0
  position = 315, 40
  border_size = 2
  border_color = $outline
  halign = center
  valign = bottom
  rounding = -1
  zindex = 3
}

shape {
  size = 40, 40
  color = $surface
  shadow_passes = 1
  shadow_size = 1
  shadow_color = $shadow
  shadow_boost = 1.0
  position = 370, 40
  border_size = 2
  border_color = $outline
  halign = center
  valign = bottom
  rounding = -1
  zindex = 3
}

# --- Power buttons --- #

label {
  text = 󰐥
  color = $error
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = 260, 48
  halign = center
  valign = bottom
  zindex = 4
  onclick = systemctl poweroff
}

label {
  text = 󰍃
  color = $secondary
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = 317, 48
  halign = center
  valign = bottom
  zindex = 4
  onclick = niri msg action quit -s
}

label {
  text = 󰤄
  color = $yellow
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  font_size = 18
  font_family = $MONOSPACE_FONT
  position = 370, 48
  halign = center
  valign = bottom
  zindex = 4
  onclick = systemctl suspend
}

# --- Time container --- #

shape {
  size = 160, 40
  color = $surface
  shadow_passes = 1
  shadow_size = 1
  shadow_color = $shadow
  shadow_boost = 1.0
  position = -320, 40
  border_size = 2
  border_color = $outline
  halign = center
  valign = bottom
  rounding = -1
  zindex = 2
}

# --- Time --- #

label {
  color = $on_surface_variant
  shadow_passes = 0
  shadow_size = 2
  shadow_color = $shadow
  shadow_boost = 1.2
  text = cmd[update:1000] date "+%r"
  font_size = 14
  font_family = $CLOCK_FONT SemiLight
  halign = center
  valign = bottom
  position = -320, 50
  zindex = 4
}
